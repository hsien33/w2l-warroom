<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<!-- 財富煉金術品牌 favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'><circle cx='64' cy='64' r='63' fill='%230f172a'/><polygon points='64,20 96,68 79,68 79,106 49,106 49,68 32,68' fill='%23F4C430'/></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>向光提詞機 · 手機錄影版</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: #000; color: #fff;
    font-family: "Microsoft JhengHei","PingFang TC",sans-serif; overflow: hidden; }

  #toplbl { position: fixed; top: 6px; left: 0; right: 0; z-index: 20; text-align: center;
    color: #F4C430; font-size: 12px; pointer-events: none; }

  /* 讀稿區：字從最上面開始 */
  #viewport { position: absolute; inset: 0; overflow: hidden; }
  #script { padding: 9vh 7vw 88vh; }
  #script .line { font-size: 7vw; line-height: 1.7; font-weight: 800; margin: 0 0 4.5vh; text-align: center; }
  #script .cue { display: block; font-size: 3.3vw; font-weight: 600; color: #64748b; margin-top: 1vh; }
  #script .em { color: #F4C430; }

  /* 自己的小視窗：移到下面（控制列上方） */
  #cam { position: fixed; bottom: 54px; left: 50%; transform: translateX(-50%); z-index: 25;
    width: 23vw; max-width: 110px; aspect-ratio: 9/16; border: 2px solid #F4C430;
    border-radius: 12px; overflow: hidden; background: #111; }
  #cv { width: 100%; height: 100%; display: block; transform: scaleX(-1); }
  #rec { position: absolute; top: 5px; right: 5px; width: 10px; height: 10px;
    border-radius: 50%; background: #ef4444; display: none; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .25; } }

  #bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; align-items: center;
    padding: 7px; background: rgba(15,23,42,.94); border-top: 1px solid #F4C430; }
  #bar button { background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 8px;
    padding: 8px 11px; font-size: 14px; }
  #bar button:active { background: #F4C430; color: #0f172a; }
  #bar button.on { background: #F4C430; color: #0f172a; border-color: #F4C430; font-weight: 700; }
  #go { font-weight: 800; background: #ef4444; color: #fff; border-color: #ef4444; padding: 8px 15px; }
  #bar .lbl { font-size: 12px; color: #94a3b8; }

  #count { position: fixed; inset: 0; z-index: 40; display: none; align-items: center;
    justify-content: center; background: rgba(0,0,0,.5); font-size: 30vw; font-weight: 900; color: #F4C430; }
  #msg { position: fixed; top: 42%; left: 0; right: 0; z-index: 45; text-align: center;
    color: #fff; font-size: 15px; padding: 0 24px; line-height: 1.8; }

  #out { position: fixed; inset: 0; z-index: 60; display: none; background: #000; padding: 14px; flex-direction: column; }
  #out video { width: 100%; flex: 1; min-height: 0; background: #111; border-radius: 10px; }
  #out .tip { color: #F4C430; font-size: 14px; text-align: center; margin: 10px 0; line-height: 1.8; }
  #out .row { display: flex; gap: 8px; }
  #out a, #out button { flex: 1; text-align: center; padding: 13px; border-radius: 10px; font-size: 16px; font-weight: 700; text-decoration: none; border: 0; }
  #dl { background: #F4C430; color: #0f172a; }
  #again { background: #334155; color: #fff; }
</style>
</head>
<body>

<div id="toplbl">👀 鏡頭在手機最上方，念的時候盡量看那裡</div>
<video id="raw" autoplay muted playsinline style="display:none"></video>
<div id="viewport"><div id="script"></div></div>

<div id="cam"><canvas id="cv" width="720" height="1280"></canvas><div id="rec"></div></div>

<div id="bar">
  <button id="go">📷 開相機</button>
  <span class="lbl">濾鏡</span>
  <button class="flt" data-b="0">關</button>
  <button class="flt on" data-b="1">自然</button>
  <button class="flt" data-b="2">柔膚</button>
  <span class="lbl">速度</span><button data-spd="-1">－</button><button data-spd="1">＋</button>
  <span class="lbl">字</span><button data-fz="-1">－</button><button data-fz="1">＋</button>
</div>

<div id="count"></div>
<div id="msg"></div>

<div id="out">
  <video id="outvid" controls playsinline></video>
  <div class="tip" id="outtip"></div>
  <div class="row">
    <a id="dl" download="父子對決Day15.mp4">⬇️ 下載到手機</a>
    <button id="again">↺ 重錄</button>
  </div>
</div>

<script>
const SCRIPT = `都說退休很爽？ 我現在__比上班還累__—— 全因為我兒子。
他賭我 30 天 IG 衝不到 1000 粉， 自己翹腳看戲等躺贏。 今天中場，我才 __450__ 😅 //比分板 450/1000
為了贏他，我熬夜想梗、學拍片， 剪到半夜——__比上班還累__ 😤
落點分析做一做上了聯合報， 今天又生出一份「3C 使用公約」， 退休生活一秒沒閒。 //聯合報截圖
結果那篇公約半天 __350 個讚__…… 追蹤數一個都沒多 😅
讚我收到啦—— 但大哥們，這場比的是「__追蹤__」啊！
誰說當爸媽的，就不會玩 IG？ 父母的尊嚴，今天靠你這一按。
追蹤 @jeff.walk2light（按讚沒用喔 😏） ＝幫老爸計一分，還差 __550__， 別讓那臭小子躺贏。 //比分板 450/1000`;

const $ = s => document.querySelector(s);
const vp = $('#viewport'), script = $('#script'), go = $('#go');
const raw = $('#raw'), cv = $('#cv'), ctx = cv.getContext('2d');
const W = 720, H = 1280, tmp = document.createElement('canvas');
let speed = 1, playing = false, raf = null, last = 0, beauty = 1;   // 速度預設最慢
let stream = null, rec = null, chunks = [], state = 'idle', drawing = false, wakeLock = null;

script.innerHTML = SCRIPT.split('\n').filter(l=>l.trim()).map(r=>{
  let [m,c] = r.split('//'); m = m.replace(/__(.+?)__/g,'<span class="em">$1</span>');
  return `<div class="line">${m}${c?`<span class="cue">（${c.trim()}）</span>`:''}</div>`;
}).join('');

function cover(vid){ const vw=vid.videoWidth, vh=vid.videoHeight; if(!vw) return;
  const s=Math.max(W/vw,H/vh), dw=vw*s, dh=vh*s; ctx.drawImage(vid,(W-dw)/2,(H-dh)/2,dw,dh); }
function frame(){
  if(!drawing) return;
  if(raw.paused) raw.play().catch(()=>{});           // 防止畫面凍住
  if(raw.videoWidth){
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; cover(raw);
    if(beauty>0){
      const sc = beauty===2?9:13;
      tmp.width=Math.round(W/sc); tmp.height=Math.round(H/sc);
      tmp.getContext('2d').drawImage(cv,0,0,tmp.width,tmp.height);
      ctx.imageSmoothingEnabled=true; ctx.globalAlpha=beauty===2?0.42:0.28; ctx.drawImage(tmp,0,0,W,H);
      ctx.globalAlpha=1; ctx.globalCompositeOperation='soft-light';
      ctx.fillStyle=beauty===2?'rgba(255,250,245,0.55)':'rgba(255,250,245,0.34)'; ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation='overlay';
      ctx.fillStyle=beauty===2?'rgba(255,222,194,0.11)':'rgba(255,228,202,0.06)'; ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation='source-over';
    }
  }
  requestAnimationFrame(frame);
}

function tick(t){ if(!playing) return; if(!last) last=t;
  const dt=(t-last)/1000; last=t; vp.scrollTop += speed*22*dt;
  if(vp.scrollTop+vp.clientHeight >= script.scrollHeight-2){ playing=false; return; }
  raf=requestAnimationFrame(tick); }
function startScroll(){ playing=true; last=0; raf=requestAnimationFrame(tick); }
function pauseScroll(){ playing=false; cancelAnimationFrame(raf); }

async function lockScreen(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
function unlockScreen(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&state==='recording') lockScreen(); });

async function openCam(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} }, audio:true });
    raw.srcObject = stream; await raw.play().catch(()=>{});
    drawing=true; frame();
    state='ready'; go.textContent='● 開始錄'; $('#msg').textContent='';
  }catch(e){ $('#msg').innerHTML='打不開相機 😣<br>請按「允許」相機與麥克風，再重新整理。<br>（必須用 https 網址開）'; }
}
function pickMime(){ const list=['video/mp4','video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  return list.find(m=>window.MediaRecorder && MediaRecorder.isTypeSupported(m)) || ''; }
function startRec(){
  chunks=[]; const mime=pickMime();
  const mixed = new MediaStream([...cv.captureStream(30).getVideoTracks(), ...stream.getAudioTracks()]);
  rec = new MediaRecorder(mixed, mime?{mimeType:mime}:undefined);
  rec.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
  rec.onstop = () => {
    const blob = new Blob(chunks, {type: chunks[0]?.type || 'video/mp4'});
    const url = URL.createObjectURL(blob); $('#outvid').src=url; $('#dl').href=url;
    const mp4=(blob.type||'').includes('mp4'); $('#dl').setAttribute('download',mp4?'父子對決Day15.mp4':'父子對決Day15.webm');
    $('#outtip').innerHTML='直式影片錄好了！<br>① 按「下載到手機」存檔；<br>② 或長按上面影片 →「儲存影片」到相簿。';
    $('#out').style.display='flex';
  };
  let n=3; const c=$('#count'); c.style.display='flex'; c.textContent=n;
  const iv=setInterval(()=>{ n--; if(n<=0){ clearInterval(iv); c.style.display='none';
      lockScreen(); rec.start(1000);            // timeslice 1s：邊錄邊存，意外中斷也保住片段
      $('#rec').style.display='block'; vp.scrollTop=0; startScroll();
      state='recording'; go.textContent='■ 停止'; }
    else c.textContent=n; }, 800);
}
function stopRec(){ pauseScroll(); unlockScreen(); $('#rec').style.display='none';
  if(rec && rec.state!=='inactive') rec.stop(); state='done'; go.textContent='● 重新錄'; }

go.onclick = () => { if(state==='idle') openCam();
  else if(state==='ready'||state==='done') startRec();
  else if(state==='recording') stopRec(); };
vp.onclick = () => { if(state==='recording'){ playing?pauseScroll():startScroll(); } };

document.querySelectorAll('.flt').forEach(b=> b.onclick=e=>{ e.stopPropagation();
  beauty=+b.dataset.b; document.querySelectorAll('.flt').forEach(x=>x.classList.remove('on')); b.classList.add('on'); });
document.querySelectorAll('[data-spd]').forEach(b=> b.onclick=e=>{ e.stopPropagation();
  speed=Math.min(10,Math.max(1,speed+(+b.dataset.spd))); });
document.querySelectorAll('[data-fz]').forEach(b=> b.onclick=e=>{ e.stopPropagation();
  const cur=parseFloat(getComputedStyle(document.querySelector('.line')).fontSize);
  const px=Math.min(120,Math.max(18,cur+(+b.dataset.fz)*5));
  document.querySelectorAll('.line').forEach(l=>l.style.fontSize=px+'px'); });
$('#again').onclick = () => { $('#out').style.display='none'; vp.scrollTop=0; state='ready'; go.textContent='● 開始錄'; };
</script>
</body>
</html>
