name: daily-morning-report

on:
  schedule:
    - cron: "0 21 * * *"    # 05:00 Taipei morning report
    - cron: "30 3 * * *"    # 11:30 Taipei midday pulse
    - cron: "0 11 * * *"    # 19:00 Taipei evening wrap
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: generate report and LINE push
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_API_VERSION: v22.0
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python gen_report.py
      - name: commit report
        run: |
          git config user.name "warroom-bot"
          git config user.email "bot@users.noreply.github.com"
          git add report.html data.json
          git diff --staged --quiet || (git commit -m "daily morning report" && git push)
      - name: alert Jeff on failure (不接受靜默失敗 · 走 Telegram)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$TG_CHAT_ID\",\"text\":\"⚠️ 晨報產生失敗（report.yml / gen_report.py 出錯）。戰情室晨報今天可能沒發，請看 GitHub Actions log。\"}" || true
