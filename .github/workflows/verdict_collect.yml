name: collect-jeff-verdicts

# 每小時把 Jeff 在戰情室按的「核可/不同意」(經 ntfy) 永久收進 verdicts.jsonl。
# ntfy 公開頻道、無需 secret。副總任何 session git pull 讀 verdicts.jsonl 即得全部裁示。
on:
  schedule:
    - cron: "20 * * * *"   # 每小時 :20 抓一次（ntfy 留 12h，遠超 1h）
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: collect verdicts from ntfy
        run: python verdict_collect.py
      - name: commit verdicts
        run: |
          git config user.name "warroom-bot"
          git config user.email "bot@users.noreply.github.com"
          git add verdicts.jsonl
          git diff --staged --quiet || (git commit -m "collect Jeff verdicts" && git push)
